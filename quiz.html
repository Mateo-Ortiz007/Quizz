<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Quiz</title>
    <link rel="stylesheet" href="quiz.css" />
  </head>
  <body>
    <div class="container">
      <div class="top">
        <span id="score">🏆 0</span>
        <span id="timer">⏱ 15</span>
        <span id="progressText">⚡ 1/10</span>
      </div>

      <div class="progress">
        <div class="bar" id="bar"></div>
      </div>

      <div class="card">
        <h2 id="question"></h2>
      </div>

      <div class="answers" id="answers"></div>
    </div>

    <script src="quiz.js"></script>
  </body>
</html>
